<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Calci Project</title>
	<link rel="stylesheet" type="text/css" href="style.css" />
	<script src="index.js" defer></script>
</head>

<body>
	<div class="outer-box">
		<div class="screen">
			<div class="numdisplay"></div>
		</div>
		<div class="numpad">
			<div class="btn-lines">
				<button class="small-buttons" id="allClear">AC</button>
				<button class="small-buttons numbers">7</button>
				<button class="small-buttons numbers">4</button>
				<button class="small-buttons numbers">1</button>
				<button class="small-buttons numbers">0</button>
			</div>
			<div class="btn-lines">
				<button class="small-buttons operators">/</button>
				<button class="small-buttons numbers">8</button>
				<button class="small-buttons numbers">5</button>
				<button class="small-buttons numbers">2</button>
				<button class="small-buttons numbers">.</button>
			</div>
			<div class="btn-lines">
				<button class="small-buttons operators">x</button>
				<button class="small-buttons numbers">9</button>
				<button class="small-buttons numbers">6</button>
				<button class="small-buttons numbers">3</button>
				<button class="small-buttons">back</button>
			</div>
			<div class="btn-lines">
				<button class="small-buttons operators">-</button>
				<button class="big-buttons operators">+</button>
				<button class="big-buttons" id="equals">=</button>
			</div>
		</div>
	</div>
	<footer><a href="https://github.com/riyasalvi-git">Github</a> </footer>
</body>

</html>
